modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      preferred_ip_protocol: ipv4
  http_post:
    prober: http
    timeout: 5s
    http:
      method: POST
      preferred_ip_protocol: ipv4
  tcp_connect:
    prober: tcp
    timeout: 5s
  ping:
    prober: ping
    timeout: 5s
